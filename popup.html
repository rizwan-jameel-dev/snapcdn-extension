<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      width: 360px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo {
      width: 30px;
      height: 30px;
      background: #2563eb;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      color: #fff;
    }
    .title    { font-size: 15px; font-weight: 700; color: #f1f5f9; }
    .subtitle { font-size: 11px; color: #64748b; margin-top: 1px; }

    /* ── Section title ── */
    .section-title {
      font-size: 10px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1e293b;
    }

    /* ── Rule items ── */
    .rule-item {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .rule-body   { flex: 1; min-width: 0; }
    .rule-badge  {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      margin-bottom: 4px;
      letter-spacing: .05em;
    }
    .badge-auto   { background: #1e3a5f; color: #60a5fa; }
    .badge-manual { background: #1a2e1a; color: #4ade80; }
    .rule-from  { font-size: 11px; color: #f87171; word-break: break-all; }
    .rule-arrow { font-size: 11px; color: #475569; margin: 2px 0; }
    .rule-to    { font-size: 11px; color: #34d399; word-break: break-all; }
    .btn-del {
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 14px;
      flex-shrink: 0;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color .15s, background .15s;
    }
    .btn-del:hover { color: #f87171; background: #2d1f1f; }

    /* ── Manual form ── */
    .form-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
    }
    label {
      font-size: 10px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .05em;
      display: block;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      margin-bottom: 8px;
      transition: border-color .15s;
    }
    input:focus  { border-color: #2563eb; }
    input::placeholder { color: #334155; }

    .btn-add {
      width: 100%;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-add:hover { background: #1d4ed8; }

    .status {
      font-size: 11px;
      text-align: center;
      margin-top: 6px;
      min-height: 14px;
      color: #10b981;
    }

    .empty {
      font-size: 11px;
      color: #334155;
      text-align: center;
      padding: 8px 0;
    }

    .divider { margin: 14px 0; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">SC</div>
    <div>
      <div class="title">SnapCDN</div>
      <div class="subtitle">Auto CDN image fixer</div>
    </div>
  </div>

  <!-- Auto detected rules -->
  <div class="section-title">Auto Detected</div>
  <div id="autoRules"></div>

  <div class="divider"></div>

  <!-- Manual input -->
  <div class="section-title">Fix Manually</div>
  <div class="form-box">
    <label>Broken CDN URL</label>
    <input id="fromUrl" type="text" placeholder="https://brokencdn.site" />
    <label>Correct CDN URL</label>
    <input id="toUrl" type="text" placeholder="https://correctcdn.frl" />
    <button class="btn-add" id="btnAdd">+ Add Rule</button>
    <div class="status" id="status"></div>
  </div>

  <!-- Manual rules -->
  <div class="section-title">Manual Rules</div>
  <div id="manualRules"></div>

  <script src="popup.js"></script>
</body>
</html>
